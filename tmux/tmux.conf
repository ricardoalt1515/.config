# Carga TPM
set -g @plugin 'tmux-plugins/tpm'

# Opciones ya probadas que limpian problemas de TMUX
set -g @plugin 'tmux-plugins/tmux-sensible'

#clipboard management
set -g @plugin 'tmux-plugins/tmux-yank'


# Tmux Navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tmux Resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes '"pi->pi -c"'  # restore pi panes into the latest project session

# Which Key
set -g @plugin 'alexwforsythe/tmux-which-key'

# Highlight/copy on-screen text (prefix+Space) and open URLs from the screen
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-fzf-options '-p 60%,30% --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'


# Floating window
bind-key -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  # open in the same directory of the current pane
  display-popup -d "#{pane_current_path}" -E "tmux new-session -A -s scratch"
}



# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Session picker (native tmux interface)
bind s choose-tree -s

# Quick new session with prompt
bind S command-prompt -p "New session name:" "new-session -A -s '%%'"

# Catppuccin (omerxx fork v1) — exact omerxx design; only diffs: position=bottom + clock
set -g @plugin 'omerxx/catppuccin-tmux'
set -g @catppuccin_flavour 'mocha'

# windows: rounded pills, number on the right (omerxx exact, no fragile v2 reverse trick)
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"

# status: session left, directory + clock right
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%Y-%m-%d %R"

# only intentional divergence from omerxx: bar at the bottom
set -g status-position bottom

# Window auto-rename to the running command
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"


# Terminal and key handling
set -g default-terminal 'tmux-256color'
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"
set -as terminal-features ",*:hyperlinks"
set -as terminal-features "xterm*:extkeys"

# extended key sequences (needed for Shift+Enter, Shift+Tab, etc.)
set -s extended-keys on
# Use CSI-u so modern TUIs can distinguish modified keys like Ctrl/Shift/Alt+Enter.
set -g extended-keys-format csi-u
set -g xterm-keys on
set -sg escape-time 10
set -g set-clipboard on

# Forward FocusGained/FocusLost to panes (needed for nvim autoread/autosave)
set -g focus-events on

# Let raw escape sequences (e.g. Kitty graphics from snacks.image) reach Ghostty
set -g allow-passthrough on

# Let tmux update the terminal window title with the active pane title
set -g set-titles on
set -g set-titles-string "#T"

# Modo vim
set -g mode-keys vi
if-shell 'uname | grep -q Darwin' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"'

# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind d split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# Open the current pane directory in Finder
bind o run-shell "open '#{pane_current_path}'"

# Kill all panes in this window except the active one (with confirmation)
bind e confirm-before -p "Kill other panes? (y/n)" "kill-pane -a"

# Mouse support
set -g mouse on

# Kill all sessions except current
bind K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Fix index
set -g base-index 1
setw -g pane-base-index 1

# Behavior — quality of life (from omerxx)
set -g history-limit 1000000   # huge scrollback
set -g renumber-windows on     # no gaps when a window is closed
set -g detach-on-destroy off   # jump to another session instead of exiting tmux

# TPM INIT
run '~/.tmux/plugins/tpm/tpm'
